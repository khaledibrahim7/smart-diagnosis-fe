<section class="login-container">
  <div class="login-card">
    <h2>🔐 Welcome Back</h2>
    <p>Login to access your Smart Diagnosis</p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label for="email">📧 Email</label>
        <input type="email" id="email" placeholder="Enter your email" required [(ngModel)]="email" name="email" />
      </div>

      <div class="input-group">
        <label for="password">🔑 Password</label>
        <input type="password" id="password" placeholder="Enter your password" required [(ngModel)]="password" name="password" />
      </div>

      <!-- TODO -->
      <!-- <div class="remember-me">
        <input type="checkbox" id="remember" [(ngModel)]="rememberMe" name="rememberMe" />
        <label for="remember">Remember Me</label>
      </div> -->

      <button type="submit" class="btn-primary">Login</button>

      <p class="forgot-password">
        <a href="#">Forgot password?</a>
      </p>
    </form>

    <p class="signup-text">Don't have an account? 
      <a href="/signup" class="signup-link">Sign Up</a>
    </p>
  </div>
</section>
